name: "Release Citadel Operations"

on:
  push:
    tags:
      - 'v*' # Triggers when a new version tag is pushed

jobs:
  build-release:
    name: "Build and Publish Release"
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to create releases
      
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4
        
      - name: "Zip Repository for Deployment"
        run: |
          zip -r MyCitadel-Release-${{ github.ref_name }}.zip . -x "*.git*" -x ".github/*" -x "GitNotes.txt"
          
      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: MyCitadel-Release-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}